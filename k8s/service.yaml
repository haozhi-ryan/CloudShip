apiVersion: v1
kind: Service
metadata:
  name: cloudship-service
spec:
  type: NodePort                 # exposes the service on a port on the node itself, reachable for local testing
  selector:
    app: cloudship               # routes traffic to any pod with this label — matches the Deployment's pod template label
  ports:
    - port: 80                   # port the Service itself is reachable on, inside the cluster
      targetPort: 3000           # port the container is actually listening on (matches containerPort in deployment.yaml)
      protocol: TCP
